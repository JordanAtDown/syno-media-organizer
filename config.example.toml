# syno-media-organizer configuration example
# Copy this file to /volume1/config/syno-media-organizer/config.toml and adjust paths.

# Scan interval in seconds (optional, default: 30)
poll_interval_secs = 30

# Persistent cache for files without capture date metadata.
# Files that fail metadata extraction are remembered on disk so they are only
# logged once. On subsequent scans they are silently skipped unless their
# modification time changes (file was updated) or the TTL expires.
# The cache is stored next to config.toml as no_date_cache.json.
# To reset it manually: delete no_date_cache.json or set no_date_cache_enabled = false.
#
# no_date_cache_enabled = true     # default: true; set false to always re-scan all files
# no_date_cache_ttl_days = 0       # default: 0 (never expire); e.g. 30 = retry monthly

# Each [[folders]] block defines one watched input folder.
# You can define as many [[folders]] blocks as needed.

[[folders]]
# Folder to watch for new files
input = "/volume1/inbox/camera"

# Root destination folder — files will be placed in output/YYYY/MM/
output = "/volume1/Phototheque"

# Naming pattern tokens:
#   {year}    — 4-digit year  (2024)
#   {month}   — 2-digit month (01-12)
#   {day}     — 2-digit day   (01-31)
#   {hour}    — 2-digit hour  (00-23)
#   {min}     — 2-digit minute
#   {sec}     — 2-digit second
#   {stem}    — original filename without extension
#   {ext}     — file extension with dot (.jpg)
#   {camera}  — camera model from EXIF (or "unknown")
#   {counter} — auto-increment counter to avoid conflicts
#   {prefix}  — photo_prefix for photos, video_prefix for videos
pattern = "{year}/{month}/{year}-{month}-{day}_{hour}{min}{sec}_{stem}{ext}"

# Optional prefixes injected via {prefix} token (default: "")
# photo_prefix = "IMG_"
# video_prefix = "VID_"

# Watch sub-folders recursively (default: true)
recursive = true

# What to do when a file with the same name already exists at the destination:
#   rename    — append _1, _2, ... until unique (default)
#   skip      — leave the source file untouched
#   overwrite — replace the existing file
on_conflict = "rename"

# Allowed file extensions (lowercase, without dot)
# Only files matching these extensions will be processed
extensions = ["jpg", "jpeg", "png", "heic", "mp4", "mov", "avi", "mkv"]

# Directories to exclude from scanning (matched against each path component).
# The default already covers all Synology DSM auto-generated hidden folders.
# Override only if you need to add or remove entries.
#
# Complete list of Synology DSM directories you may want to exclude:
#   @eaDir             — thumbnails and metadata (Synology Photos / Photo Station)
#   @SynoEAStream      — extended attribute streams (DSM filesystem feature)
#   @Recycle           — Synology shared folder recycle bin
#   #recycle           — alternate recycle bin name (depends on DSM version)
#   @tmp               — DSM temporary files
#   @sharebin          — shared folder trash (older DSM versions)
#   @database          — Synology Photos internal database
#   @photos            — Synology Photos working directory
#   @Recently-Snapshot — Btrfs snapshot staging area (only on Btrfs volumes)
#
# excluded_dirs = ["@eaDir", "@SynoEAStream", "@Recycle", "#recycle", "@tmp"]


# Second folder example — Synology Drive sync folder
[[folders]]
input = "/volume1/homes/jordan/Drive/Synchro"
output = "/volume1/homes/jordan/Photos/PhotoLibrary"
recursive = true
on_conflict = "skip"
extensions = ["jpg", "jpeg", "heic", "png", "mp4", "mov"]
# excluded_dirs = ["@eaDir", "@SynoEAStream", "@Recycle", "#recycle", "@tmp"]
