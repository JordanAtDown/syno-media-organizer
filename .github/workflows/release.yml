name: Release

on:
  push:
    tags: ['v*.*.*']

jobs:
  release:
    name: Build SPK and publish GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-unknown-linux-musleabihf

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install musl ARM cross-compiler
        run: |
          wget -q https://musl.cc/arm-linux-musleabihf-cross.tgz
          sudo tar xzf arm-linux-musleabihf-cross.tgz -C /usr/local
          echo "/usr/local/arm-linux-musleabihf-cross/bin" >> $GITHUB_PATH

      - name: Cross-compile for ARMv7 (musl static)
        run: cargo build --release --target armv7-unknown-linux-musleabihf

      - name: Build SPK package
        run: bash scripts/build-spk.sh

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          NOTES=$(awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.changelog.outputs.version }}"
          body: ${{ steps.changelog.outputs.notes }}
          files: |
            dist/syno-media-organizer-*.spk
            dist/syno-media-organizer-*.spk.sha256
