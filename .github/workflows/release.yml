name: Release

on:
  push:
    tags: ['v*.*.*']

jobs:
  release:
    name: Build SPK and publish GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-unknown-linux-musleabihf

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild and ARM strip
        run: |
          cargo install cargo-zigbuild --locked
          sudo apt-get install -y gcc-arm-linux-gnueabihf

      - name: Cross-compile for ARMv7 musl (static)
        run: cargo zigbuild --release --target armv7-unknown-linux-musleabihf

      - name: Build SPK package
        run: bash scripts/build-spk.sh

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          NOTES=$(awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.changelog.outputs.version }}"
          body: ${{ steps.changelog.outputs.notes }}
          files: |
            dist/syno-media-organizer-*.spk
            dist/syno-media-organizer-*.spk.sha256

      - name: Update packages.json with SPK metadata
        run: |
          VERSION=${{ steps.changelog.outputs.version }}
          SPK_FILE="dist/syno-media-organizer-${VERSION}.spk"
          SPK_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/syno-media-organizer-${VERSION}.spk"
          SPK_SIZE=$(stat -c%s "$SPK_FILE")
          SPK_MD5=$(md5sum "$SPK_FILE" | cut -d' ' -f1)
          CHANGELOG_ENTRY=$(awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md \
            | grep -v '^$' | head -3 | tr '\n' ' ' | sed 's/[[:space:]]*$//')
          jq --arg ver "${VERSION}-0001" \
             --arg url "$SPK_URL" \
             --argjson size $SPK_SIZE \
             --arg md5 "$SPK_MD5" \
             --arg log "$CHANGELOG_ENTRY" \
             '.packages[0].version = $ver | .packages[0].link = $url | .packages[0].size = $size | .packages[0].md5 = $md5 | .packages[0].changelog = $log' \
             docs/packages.json > /tmp/pkg.json.tmp && mv /tmp/pkg.json.tmp docs/packages.json

      - name: Commit and push packages.json update
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add docs/packages.json
          git commit -m "chore(pages): update packages.json for ${{ github.ref_name }} [skip ci]"
          git push origin HEAD:master
