name: CI

on:
  push:
    branches: [master]
    tags-ignore: ['v*']   # Tags are handled by release.yml
  pull_request:
    branches: [master]

jobs:
  check:
    name: Lint, test & cross-compile
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: armv7-unknown-linux-musleabihf

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Unit tests
        run: cargo test --lib

      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Cross-compile for ARMv7 musl (static)
        run: cargo zigbuild --release --target armv7-unknown-linux-musleabihf

      - name: Verify binary is statically linked
        run: |
          file target/armv7-unknown-linux-musleabihf/release/syno-media-organizer
          ! file target/armv7-unknown-linux-musleabihf/release/syno-media-organizer | grep -q "dynamically linked"

      - name: Upload ARM binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: syno-media-organizer-armv7
          path: target/armv7-unknown-linux-musleabihf/release/syno-media-organizer
          retention-days: 7
